<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>සුභ අලුත් අවුරුද්දක් 2026</title>

<style>
body {
  margin: 0;
  height: 100vh;
  display: flex;
  justify-content: center;
  align-items: center;
  background: linear-gradient(#f9c400, #ffe680);
  font-family: 'Noto Sans Sinhala', sans-serif;
}

/* CONTAINER */
.container {
  position: relative;
  width: 95%;
  max-width: 420px;
}

/* IMAGE */
.poster {
  width: 100%;
  border-radius: 20px;
  box-shadow: 0 10px 30px rgba(0,0,0,0.3);
  animation: fadeIn 1.5s ease-in-out;
}

/* TEXT */
.text {
  position: absolute;
  top: 55%;
  left: 50%;
  transform: translate(-50%, -50%);
  text-align: center;
  color: white;
  font-weight: bold;
  padding: 10px;
  text-shadow: 2px 2px 10px rgba(0,0,0,0.6);
}

.text h1 {
  font-size: 22px;
  animation: zoomIn 1.5s ease;
}

.text p {
  font-size: 14px;
  line-height: 1.5;
  animation: fadeUp 2s ease;
}

/* SPARKLES */
.sparkle {
  position: absolute;
  width: 6px;
  height: 6px;
  background: white;
  border-radius: 50%;
  animation: float 5s infinite;
}

.sparkle:nth-child(1) { top: 10%; left: 20%; }
.sparkle:nth-child(2) { top: 30%; left: 70%; }
.sparkle:nth-child(3) { top: 80%; left: 40%; }

/* ANIMATIONS */
@keyframes fadeIn {
  from { opacity: 0; }
  to { opacity: 1; }
}

@keyframes zoomIn {
  from { transform: scale(0.5); }
  to { transform: scale(1); }
}

@keyframes fadeUp {
  from { opacity: 0; transform: translateY(20px); }
  to { opacity: 1; transform: translateY(0); }
}

@keyframes float {
  0% { transform: translateY(0); opacity: 1; }
  50% { transform: translateY(-15px); opacity: 0.5; }
  100% { transform: translateY(0); opacity: 1; }
}

/* MOBILE */
@media (max-width: 480px) {
  .text h1 {
    font-size: 18px;
  }
  .text p {
    font-size: 12px;
  }
}
</style>
</head>

<body>

<div class="container">

  <!-- GITHUB IMAGE -->
  <img src="https://raw.githubusercontent.com/nadunmadushaorg-del/awrudu-wish/main/awrudu.png" class="poster">

  <!-- TEXT -->
  <div class="text">
    <h1>සුභ අලුත් අවුරුද්දක්!</h1>
    <p>
      ඔබට සහ ඔබගේ පවුලට  
      සතුට, සෞභාග්‍ය සහ  
      සාර්ථක නව වසරක් වේවා! 🎉
    </p>
  </div>

  <!-- EFFECTS -->
  <div class="sparkle"></div>
  <div class="sparkle"></div>
  <div class="sparkle"></div>

</div>

</body>
</html>
