<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>සුභ අලුත් අවුරුද්දක් 2026</title>

<style>
body {
  margin: 0;
  height: 100vh;
  display: flex;
  justify-content: center;
  align-items: center;
  background: linear-gradient(#f9c400, #ffe680);
  font-family: 'Noto Sans Sinhala', sans-serif;
}

/* CONTAINER */
.container {
  position: relative;
  width: 95%;
  max-width: 420px;
}

/* IMAGE */
.poster {
  width: 100%;
  border-radius: 20px;
  box-shadow: 0 10px 30px rgba(0,0,0,0.3);
}

/* TEXT OVERLAY */
.text {
  position: absolute;
  top: 55%;
  left: 50%;
  transform: translate(-50%, -50%);
  text-align: center;
  color: white;
  font-weight: bold;
  padding: 10px;
  text-shadow: 2px 2px 10px rgba(0,0,0,0.6);
}

.text h1 {
  font-size: 24px;
}

.text p {
  font-size: 14px;
  line-height: 1.5;
}

/* MOBILE */
@media (max-width: 480px) {
  .text h1 {
    font-size: 20px;
  }
  .text p {
    font-size: 13px;
  }
}
</style>
</head>

<body>

<div class="container">

  <!-- GOOGLE DRIVE IMAGE -->
  <img src="https://github.com/nadunmadushaorg-del/awrudu-wish/blob/main/awrudu.png" class="poster">

  <!-- TEXT -->
  <div class="text">
    <h1>සුභ අලුත් අවුරුද්දක්!</h1>
    <p>
      ඔබට සහ ඔබගේ පවුලට  
      සතුට, සෞභාග්‍ය සහ  
      සම්පූර්ණයෙන්ම සාර්ථක  
      නව වසරක් වේවා! 🎉
    </p>
  </div>

</div>

</body>
</html>
