<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>සුභ අලුත් අවුරුද්දක් 2026</title>

<style>
body {
  margin: 0;
  height: 100vh;
  display: flex;
  justify-content: center;
  align-items: center;
  background: linear-gradient(#f9c400, #ffe680);
  font-family: 'Noto Sans Sinhala', sans-serif;
}

/* CONTAINER */
.container {
  position: relative;
  width: 95%;
  max-width: 420px;
}

/* IMAGE */
.poster {
  width: 100%;
  border-radius: 20px;
  box-shadow: 0 10px 30px rgba(0,0,0,0.3);
}

/* TEXT */
.text {
  position: absolute;
  top: 55%;
  left: 50%;
  transform: translate(-50%, -50%);
  text-align: center;
  font-weight: bold;
  padding: 10px;
}

/* BLUE ANIMATED TEXT */
.text h1 {
  font-size: 22px;
  background: linear-gradient(45deg, #00c6ff, #0072ff);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  animation: glow 2s infinite alternate, floatText 3s ease-in-out infinite;
}

.text p {
  font-size: 14px;
  line-height: 1.5;
  color: #0066ff;
  text-shadow: 0 0 10px rgba(0,102,255,0.7);
  animation: fadeUp 2s ease, pulse 2s infinite;
}

/* ANIMATIONS */
@keyframes glow {
  from {
    text-shadow: 0 0 5px #00c6ff, 0 0 10px #0072ff;
  }
  to {
    text-shadow: 0 0 15px #00c6ff, 0 0 25px #0072ff;
  }
}

@keyframes floatText {
  0% { transform: translate(-50%, -50%) translateY(0); }
  50% { transform: translate(-50%, -50%) translateY(-5px); }
  100% { transform: translate(-50%, -50%) translateY(0); }
}

@keyframes fadeUp {
  from { opacity: 0; transform: translateY(20px); }
  to { opacity: 1; transform: translateY(0); }
}

@keyframes pulse {
  0% { opacity: 0.7; }
  50% { opacity: 1; }
  100% { opacity: 0.7; }
}

/* MOBILE */
@media (max-width: 480px) {
  .text h1 {
    font-size: 18px;
  }
  .text p {
    font-size: 12px;
  }
}
</style>
</head>

<body>

<div class="container">

  <!-- GITHUB IMAGE -->
  <img src="https://raw.githubusercontent.com/nadunmadushaorg-del/awrudu-wish/main/awrudu.png" class="poster">

  <!-- TEXT -->
  <div class="text">
    <h1>සුභ අලුත් අවුරුද්දක්!</h1>
    <p>
      ඔබට සහ ඔබගේ පවුලට  
      සතුට, සෞභාග්‍ය සහ  
      සාර්ථක නව වසරක් වේවා! 🎉
    </p>
  </div>

</div>

</body>
</html>
